<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opencomp</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: #fdfdfd;
            color: #333;
        }
        .container {
            max-width: 600px;
            padding: 40px;
        }
        img {
            max-width: 200px;
            height: auto;
            margin-bottom: 30px;
        }
        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #000;
        }
        p {
            font-size: 1.1rem;
            color: #555;
            max-width: 400px;
            margin: 0 auto;
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/cropped-opencomp_logo.png" alt="Opencomp Logo">
        <h1>Opencomp</h1>
        <p>Providing expert solutions for modern challenges. Stay tuned for our new digital experience.</p>
        <div class="footer">
            &copy; 2026 Opencomp. All rights reserved.
        </div>
    </div>
</body>
</html>
