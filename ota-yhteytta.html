<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opencomp – Ota yhteyttä</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <div class="logo">OPENCOMP</div>
    <nav>
      <ul>
        <li><a href="index.html">Etusivu</a></li>
        <li><a href="tietoa-minusta.html">Tietoa minusta</a></li>
        <li><a href="artikkelit.html">Artikkelit</a></li>
        <li><a href="ota-yhteytta.html" class="active">Ota yhteyttä</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section>
      <h2>Ota yhteyttä</h2>
      <p style="margin-bottom: 2rem;">Haluatko kertoa jotain, ehdottaa aiheesta tai vain sanoa hei? Ota rohkeasti yhteyttä!</p>

      <div class="contact-info">
        <div class="card">
          <h3>Email</h3>
          <p>info@opencomp.fi</p>
        </div>
        <div class="card">
          <h3>Sijainti</h3>
          <p>Suomi</p>
        </div>
        <div class="card">
          <h3>Sosiaalinen media</h3>
          <p>@opencomp</p>
        </div>
      </div>

      <form action="#" method="post">
        <label for="name">Nimi</label>
        <input type="text" id="name" name="name" placeholder="Syötä nimesi" required>

        <label for="email">Sähköposti</label>
        <input type="email" id="email" name="email" placeholder="Syötä sähköpostiosoitteesi" required>

        <label for="subject">Aihe</label>
        <input type="text" id="subject" name="subject" placeholder="Mitä asia koskee?">

        <label for="message">Viesti</label>
        <textarea id="message" name="message" placeholder="Kirjoita viestisi tähän..." required></textarea>

        <button type="submit">Lähetä viesti</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Opencomp. Kaikki oikeudet pidätetään.</p>
  </footer>
</body>
</html>
